<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>계단 없는 길 | 배리어프리 지하철 환승 경로</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="skip-link"><a href="#main">본문 바로가기</a></div>

  <header class="hero">
    <div class="hero__eyebrow">팀 태양 · BFS 기반 교통약자 환승 경로 서비스</div>
    <h1 class="hero__title">계단 없는 길</h1>
    <p class="hero__desc">
      휠체어·전동휠체어 이용자를 위해 <strong>엘리베이터가 있는 역만</strong> 골라
      최소 정차역 경로를 찾고, 내려서 <strong>어느 칸 몇 번 문</strong>으로 가야
      엘리베이터가 가장 가까운지까지 안내합니다.
    </p>
  </header>

  <main id="main">
    <section class="search-card" aria-label="경로 검색">
      <div class="search-row">
        <div class="field">
          <label for="start-input">출발역</label>
          <input id="start-input" list="station-list" placeholder="예: 왕십리" autocomplete="off" />
        </div>

        <button id="swap-btn" class="swap-btn" type="button" aria-label="출발역과 도착역 바꾸기">⇅</button>

        <div class="field">
          <label for="end-input">도착역</label>
          <input id="end-input" list="station-list" placeholder="예: 강남" autocomplete="off" />
        </div>

        <datalist id="station-list"></datalist>

        <button id="find-route-btn" class="primary-btn" type="button">배리어프리 경로 찾기</button>
      </div>
      <p id="search-error" class="search-error" role="alert" hidden></p>
    </section>

    <section id="result-section" class="result-section" hidden aria-live="polite">
      <div id="route-note" class="route-note" hidden></div>
      <div id="route-summary" class="route-summary"></div>
      <ol id="route-timeline" class="route-timeline"></ol>
    </section>
  </main>

  <footer class="footer"></footer>

  <script src="app.js"></script>
</body>
</html>
